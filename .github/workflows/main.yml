name: Movie Collector
on:
  schedule:
    - cron: '0 0 * * *' # Every night
  workflow_dispatch:
jobs:
  - name: Install dependencies
        run: |
          pip install requests wikipedia-api

      - name: Run Script
        run: |
          python scripts/collector.py
steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests wikipedia-api

      - name: Run Script
        run: |
          python scripts/collector.py
