name: Movie Collector
on:
  schedule:
    - cron: '0 0 * * *' # Every night
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Run Script
        run: |
          pip install requests
          python scripts/collector.py
      - name: Save Data
        run: |
          git config --global user.name 'Movie-Bot'
          git config --global user.email 'bot@github.com'
          git add data/movies.json
          git commit -m "Auto-update database" || exit 0
          git push
