name: Movie Collector
name: Movie Collector

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write  # This fixes the Exit Code 128 (Permission Denied)

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests wikipedia-api

      - name: Run Movie Collector Script
        run: |
          python scripts/collector.py

      - name: Commit and Push Data Updates
        run: |
          git config --global user.name 'CinemaHub-Bot'
          git config --global user.email 'bot@github.com'
          git add data/movies.json
          git commit -m "Auto-update: New Movie Data Synchronized" || echo "No changes to commit"
          git push
