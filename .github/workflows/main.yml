name: Movie & TV Collector

on:
  schedule:
    # This triggers the "Auto-Pilot" every night at 12:00 AM UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    # This allows you to click the "Run workflow" button manually anytime

permissions:
  contents: write

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Collector Script
        run: |
          python scripts/collector.py

      - name: Commit and Push Data Updates
        run: |
          git config --global user.name 'CinemaHub-Bot'
          git config --global user.email 'bot@github.com'
          git add data/movies.json
          # The "|| echo" prevents the workflow from failing if there are no new movies found
          git commit -m "Auto-Update: Global Movie & TV Data Synced" || echo "No changes to commit"
          git push
