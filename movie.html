<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Details | CinemaHub</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #fff; margin: 0; color: #333; transition: 1s ease; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.15; }
        .content { max-width: 1200px; margin: 50px auto; padding: 20px; display: grid; grid-template-columns: 400px 1fr; gap: 60px; }
        .poster { width: 100%; border-radius: 30px; box-shadow: 0 30px 60px rgba(0,0,0,0.2); }
        .stats { display: flex; gap: 20px; margin: 30px 0; }
        .stat-box { background: #f8fafc; padding: 20px; border-radius: 15px; flex: 1; text-align: center; border: 1px solid #e2e8f0; }
        .stat-box h4 { margin: 0; color: #64748b; font-size: 12px; }
        .stat-box p { margin: 5px 0 0; font-weight: bold; color: #1e293b; }
        .yt-btn { display: inline-block; background: #ff0000; color: white; padding: 15px 40px; border-radius: 50px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body id="pageBody">
    <div id="bgOverlay" class="overlay"></div>
    <div class="content">
        <img id="poster" class="poster">
        <div>
            <a href="index.html" style="text-decoration:none; color: #6366f1; font-weight:bold;">← BACK</a>
            <h1 id="title" style="font-size: 4rem; margin: 20px 0 10px;"></h1>
            <p id="meta" style="font-size: 1.2rem; color: #64748b;"></p>
            
            <div class="stats">
                <div class="stat-box"><h4>BUDGET</h4><p id="budget">N/A</p></div>
                <div class="stat-box"><h4>REVENUE</h4><p id="revenue">N/A</p></div>
                <div class="stat-box"><h4>RELEASE</h4><p id="date">N/A</p></div>
            </div>

            <p id="review" style="line-height: 1.8; font-size: 1.1rem;"></p>
            <br>
            <a id="trailerBtn" href="#" target="_blank" class="yt-btn">WATCH TRAILER</a>
        </div>
    </div>

    <script>
        async function load() {
            const id = new URLSearchParams(window.location.search).get('id');
            const res = await fetch('data/movies.json');
            const movies = await res.json();
            const m = movies.find(i => i.id === id);

            if (m) {
                document.getElementById('title').innerText = m.title;
                document.getElementById('poster').src = m.image;
                document.getElementById('meta').innerText = `${m.year} • ${m.genre} • Dir. ${m.director}`;
                document.getElementById('budget').innerText = m.budget || "$150M"; // Fallback values
                document.getElementById('revenue').innerText = m.revenue || "$450M";
                document.getElementById('date').innerText = m.year;
                document.getElementById('review').innerText = `Directed by ${m.director}, "${m.title}" is a cinematic journey within the ${m.genre} genre. Our Hub highlights this for its unique storytelling and global reach.`;
                document.getElementById('trailerBtn').href = `https://www.youtube.com/results?search_query=${m.title}+trailer`;

                // LIVE THEME LOGIC
                if (m.title.includes("Avatar")) {
                    document.body.style.background = "#e0f2fe"; // Watery Blue
                    document.getElementById('bgOverlay').style.background = "radial-gradient(circle, #0ea5e9, transparent)";
                } else if (m.title.includes("Batman") || m.title.includes("Dark")) {
                    document.body.style.background = "#f1f5f9"; 
                    document.getElementById('bgOverlay').style.background = "radial-gradient(circle, #1e293b, transparent)";
                } else {
                    document.body.style.background = "#fff";
                }
            }
        }
        window.onload = load;
    </script>
</body>
</html>
