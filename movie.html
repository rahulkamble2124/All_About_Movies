<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Details | CinemaHub</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #080808; color: white; margin: 0; }
        .banner { 
            height: 65vh; width: 100%; position: relative;
            background-size: cover; background-position: center top;
            display: flex; align-items: flex-end;
        }
        .banner::after { content: ''; position: absolute; top:0; left:0; width:100%; height:100%; background: linear-gradient(to top, #080808, transparent); }
        .header-content { position: relative; z-index: 2; padding: 50px; }
        .main { max-width: 1100px; margin: -60px auto 0; padding: 20px; position: relative; z-index: 3; }
        .details-grid { display: grid; grid-template-columns: 300px 1fr; gap: 50px; }
        .poster-img { width: 100%; border-radius: 12px; border: 1px solid #333; box-shadow: 0 30px 60px rgba(0,0,0,0.7); }
        
        .stars { font-size: 30px; color: #444; cursor: pointer; margin-top: 10px; }
        .stars span.active { color: #ffcc00; text-shadow: 0 0 10px rgba(255,204,0,0.5); }
        
        .review-box { background: #111; padding: 30px; border-radius: 15px; border-left: 6px solid #e50914; line-height: 1.8; margin: 25px 0; }
        .trailer-box { margin-top: 40px; border-radius: 20px; overflow: hidden; background: #000; aspect-ratio: 16/9; border: 1px solid #222; }
        .back-link { color: #e50914; text-decoration: none; font-weight: bold; display: inline-block; margin-bottom: 20px; }
        @media (max-width: 800px) { .details-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div id="banner" class="banner">
        <div class="header-content">
            <a href="index.html" class="back-link">← EXPLORE HUB</a>
            <h1 id="title" style="font-size: clamp(2rem, 7vw, 4.5rem); margin: 0;"></h1>
            <p id="meta" style="color: #888; font-size: 1.3rem; margin-top: 10px;"></p>
        </div>
    </div>

    <div class="main">
        <div class="details-grid">
            <div>
                <img id="poster" class="poster-img">
                <div style="margin-top: 25px; text-align: center;">
                    <p style="margin-bottom: 5px; color: #888;">YOUR RATING</p>
                    <div class="stars" id="starContainer">
                        <span onclick="setRating(1)">★</span><span onclick="setRating(2)">★</span><span onclick="setRating(3)">★</span><span onclick="setRating(4)">★</span><span onclick="setRating(5)">★</span>
                    </div>
                </div>
            </div>
            <div>
                <h2 style="color: #e50914;">Hub Synopsis</h2>
                <div id="review" class="review-box"></div>
                <p><strong>Director:</strong> <span id="director" style="color: #ccc;"></span></p>
                <p><strong>Cast:</strong> <span id="actors" style="color: #ccc;"></span></p>
                <p><strong>Official IMDb Score:</strong> <span id="imdb" style="color: #ffcc00; font-weight: bold;"></span></p>
            </div>
        </div>

        <h2 style="margin-top: 50px;">CinemaHub Preview</h2>
        <div class="trailer-box">
            <iframe id="trailer" width="100%" height="100%" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        let currentMovieId = "";

        async function load() {
            currentMovieId = new URLSearchParams(window.location.search).get('id');
            const res = await fetch('data/movies.json');
            const movies = await res.json();
            const m = movies.find(item => item.id === currentMovieId);

            if (m) {
                document.getElementById('title').innerText = m.title;
                document.getElementById('poster').src = m.image;
                document.getElementById('banner').style.backgroundImage = `linear-gradient(to top, #080808, transparent), url(${m.image})`;
                document.getElementById('meta').innerText = `${m.year} • ${m.genre}`;
                document.getElementById('director').innerText = m.director;
                document.getElementById('actors').innerText = m.actors;
                document.getElementById('imdb').innerText = m.imdbRating + " / 10";
                document.getElementById('trailer').src = `https://www.youtube.com/embed?listType=search&list=${encodeURIComponent(m.trailer_query)}`;

                const reviewText = `From the perspective of ${m.director}, "${m.title}" offers a striking narrative in the ${m.genre} space. Since its debut in ${m.year}, it has been recognized for its atmospheric depth and thematic resonance. The performances by ${m.actors} anchor the film's ${m.category} identity, providing a cinematic experience that feels both familiar and refreshingly bold. Our CinemaHub analysis rates this as a significant production that effectively utilizes visual storytelling to bridge the gap between plot complexity and audience engagement. It is an essential viewing for those tracking the evolution of modern cinema.`;
                document.getElementById('review').innerText = reviewText;

                const savedRating = localStorage.getItem('rating_' + currentMovieId);
                if (savedRating) updateStarUI(savedRating);
            }
        }

        function setRating(n) {
            localStorage.setItem('rating_' + currentMovieId, n);
            updateStarUI(n);
        }

        function updateStarUI(n) {
            const stars = document.getElementById('starContainer').children;
            for (let i = 0; i < 5; i++) {
                stars[i].classList.toggle('active', i < n);
            }
        }

        window.onload = load;
    </script>
</body>
</html>
