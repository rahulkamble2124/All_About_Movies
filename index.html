<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CinemaHub | Global Movie Database</title>
    <style>
        :root {
            --primary: #e50914;
            --bg: #141414;
            --card-bg: #2f2f2f;
            --text: #ffffff;
            --subtext: #ccc;
        }

        /* Light Mode Variables */
        body.light-mode {
            --bg: #f4f4f4;
            --card-bg: #ffffff;
            --text: #141414;
            --subtext: #555;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            transition: background 0.3s, color 0.3s;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto 40px auto;
        }

        .logo h1 {
            color: var(--primary);
            margin: 0;
            letter-spacing: 2px;
        }

        #themeToggle {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        .search-section {
            text-align: center;
            margin-bottom: 40px;
        }

        #searchInput {
            padding: 15px 25px;
            width: 100%;
            max-width: 500px;
            border-radius: 30px;
            border: 2px solid #444;
            background: var(--card-bg);
            color: var(--text);
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        #searchInput:focus {
            border-color: var(--primary);
        }

        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .movie-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
        }

        .movie-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(229, 9, 20, 0.2);
        }

        .movie-card img {
            width: 100%;
            height: 320px;
            object-fit: cover;
            border-bottom: 3px solid var(--primary);
        }

        .movie-info {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .category-tag {
            background: var(--primary);
            color: white;
            font-size: 11px;
            font-weight: bold;
            padding: 3px 10px;
            border-radius: 5px;
            align-self: flex-start;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .movie-info h3 {
            margin: 0 0 10px 0;
            font-size: 1.1rem;
        }

        .movie-info p {
            font-size: 0.9rem;
            color: var(--subtext);
            line-height: 1.5;
            margin-bottom: 15px;
        }

        .btn-details {
            margin-top: auto;
            text-align: center;
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 10px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-details:hover {
            background: var(--primary);
            color: white;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <h1>CINEMA HUB</h1>
        </div>
        <button id="themeToggle" onclick="toggleTheme()">Toggle Light Mode</button>
    </header>

    <div class="search-section">
