<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CINEMA HUB | Global Movie DB</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">CINEMA<span>HUB</span></div>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search Bollywood, Hollywood, Actors..." onkeyup="filterMovies()">
        </div>
    </nav>

    <header class="hero">
        <div class="hero-text">
            <h1>Trending Cinema</h1>
            <p>Auto-updating encyclopedia of global movies and stars.</p>
        </div>
    </header>

    <div class="container">
        <div class="filter-row">
            <select id="genreFilter" onchange="filterMovies()">
                <option value="all">All Genres</option>
                <option value="Action">Action</option>
                <option value="Drama">Drama</option>
            </select>
        </div>
        <div class="movie-grid" id="movieGrid"></div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
