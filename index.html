<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CinemaHub | Global Movie Database</title>
    <style>
        :root {
            --primary: #e50914;
            --bg: #141414;
            --card-bg: #2f2f2f;
            --text: #ffffff;
        }
        body.light-mode {
            --bg: #f4f4f4;
            --card-bg: #ffffff;
            --text: #141414;
        }
        body {
            font-family: 'Arial', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            transition: 0.3s;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto 30px auto;
        }
        #searchInput {
            display: block;
            width: 100%;
            max-width: 500px;
            margin: 0 auto 40px auto;
            padding: 15px;
            border-radius: 25px;
            border: 2px solid #444;
            background: var(--card-bg);
            color: var(--text);
        }
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .movie-card {
            background: var(--card-bg);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .movie-card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }
        .movie-info { padding: 15px; }
        .movie-info h3 { margin: 0 0 10px 0; color: var(--primary); }
        .btn {
            display: block;
            text-align: center;
            background: var(--primary);
            color: white;
            padding: 10px;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <header>
        <h1 style="color: var(--primary);">CINEMA HUB</h1>
        <button onclick="document.body.classList.toggle('light-mode')" style="padding: 10px; border-radius: 5px; cursor: pointer;">🌓 Mode</button>
    </header>

    <input type="text" id="searchInput" placeholder="Search movies..." onkeyup="filterMovies()">

    <div class="movie-grid" id="movieGrid">
        <p style="text-align: center; width: 100%;">Connecting to database...</p>
    </div>

    <script>
        let allMovies = [];

        async function loadData() {
            const grid = document.getElementById('movieGrid');
            try {
                // Using a direct path to your JSON file
                const response = await fetch('data/movies.json');
                if (!response.ok) throw new Error("Could not find movies.json");
                
                allMovies = await response.json();
                display(allMovies);
            } catch (err) {
                grid.innerHTML = `<p style="text-align:center; width:100%;">Error: ${err.message}. <br> Make sure 'data/movies.json' exists and is not empty!</p>`;
            }
        }

        function display(movies) {
            const grid = document.getElementById('movieGrid');
            grid.innerHTML = movies.map(m => `
                <div class="movie-card">
                    <img src="${m.image && m.image !== 'N/A' ? m.image : 'https://via.placeholder.com/300x450'}" alt="${m.title}">
                    <div class="movie-info">
                        <h3>${m.title}</h3>
                        <p style="font-size: 14px; color: #888;">${m.category}</p>
                        <a href="${m.link}" target="_blank" class="btn">View Info</a>
                    </div>
                </div>
            `).join('');
        }

        function filterMovies() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allMovies.filter(m => m.title.toLowerCase().includes(val));
            display(filtered);
        }

        // Run when page loads
        window.onload = loadData;
    </script>
</body>
</html>
