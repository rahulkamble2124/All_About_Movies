<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Cinema Hub | Hollywood & Bollywood</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --main-bg: #0b0d17;
            --accent: #e50914; /* Netflix Red */
            --card-bg: rgba(255, 255, 255, 0.05);
            --gold: #ffc107;
        }

        body {
            background: var(--main-bg);
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* Navbar */
        nav {
            display: flex;
            justify-content: space-between;
            padding: 20px 5%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            position: fixed;
            width: 100%;
            z-index: 100;
        }

        .logo { font-size: 24px; font-weight: 900; color: var(--accent); letter-spacing: 2px; }

        /* Hero Section */
        .hero {
            height: 80vh;
            display: flex;
            align-items: center;
            padding: 0 5%;
            background: linear-gradient(to right, #0b0d17, transparent), url('https://wallpapercave.com/wp/wp11833503.jpg');
            background-size: cover;
            background-position: center;
        }

        .hero-info h1 { font-size: 4rem; margin: 0; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        .hero-info p { max-width: 500px; color: #ccc; margin: 20px 0; }
<div class="filter-bar">
    <input type="text" id="search-input" placeholder="Search Movies, Actors, or Directors..." onkeyup="applyFilters()">
    <select id="genre-select" onchange="applyFilters()">
        <option value="all">All Genres</option>
        <option value="Action">Action</option>
        <option value="Drama">Drama</option>
        <option value="Sci-Fi">Sci-Fi</option>
    </select>
    <select id="year-select" onchange="applyFilters()">
        <option value="all">All Years</option>
    </select>
</div>
        /* Trending Grid */
        .content-section { padding: 40px 5%; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 30px;
        }

        .movie-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
        }

        .movie-card:hover {
            transform: scale(1.05);
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(229, 9, 20, 0.4);
        }

        .movie-card img { width: 100%; height: 320px; object-fit: cover; }
        .movie-card-info { padding: 15px; }
        .rating { color: var(--gold); font-size: 0.9rem; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">CINEMA-AI</div>
        <div class="menu">
            <i class="fas fa-search"></i>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-info">
            <span style="color:var(--accent)">NEW RELEASES</span>
            <h1>Bollywood Meets Hollywood</h1>
            <p>The first AI-driven movie encyclopedia that updates itself with global trends, news, and cast biographies automatically.</p>
            <button style="background:var(--accent); color:white; border:none; padding:12px 30px; border-radius:5px; font-weight:bold; cursor:pointer;">
                EXPLORE NOW
            </button>
        </div>
    </header>

    <section class="content-section">
        <h2 style="margin-bottom:30px;">Trending Worldwide</h2>
        <div class="grid" id="movie-display">
            <div class="movie-card">
                <img src="https://m.media-amazon.com/images/M/MV5BMMySWM0MTYtMDYyMy00YTMxLWI3OGEtZDU2ZGIwMGVjOWI5XkEyXkFqcGc@._V1_SX300.jpg" alt="Movie">
                <div class="movie-card-info">
                    <h3>Jawan</h3>
                    <div class="rating"><i class="fas fa-star"></i> 8.4/10</div>
                </div>
            </div>
        </div>
    </section>

</body>
</html>
